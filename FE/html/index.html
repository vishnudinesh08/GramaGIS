<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GramaGIS – Vazhathope Panchayat</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

    <!-- Top-right admin entry point -->
    <nav class="top-nav">
        <div class="nav-logo">GramaGIS</div>
        <a href="login.html" class="admin-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            Admin Login
        </a>
    </nav>

    <div class="landing-container">

        <!-- Animated background particles -->
        <div class="bg-grid"></div>

        <div class="content">
            <div class="badge">Vazhathope Grama Panchayat · Kerala</div>
            <h1>GramaGIS</h1>
            <p class="tagline">Spatial intelligence for smarter village governance.<br>Explore infrastructure, query data, and plan better.</p>

            <div class="cta-group">
                <a href="map.html" class="btn btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
                    Explore Interactive Map
                </a>
                <a href="feedback.html" class="btn btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Submit Feedback
                </a>
            </div>

            <div class="stats-row">
                <div class="stat"><span class="stat-num">15</span><span class="stat-label">Wards Mapped</span></div>
                <div class="stat-divider"></div>
                <div class="stat"><span class="stat-num">200+</span><span class="stat-label">Assets Digitized</span></div>
                <div class="stat-divider"></div>
                <div class="stat"><span class="stat-num">AI</span><span class="stat-label">Powered Search</span></div>
            </div>
        </div>

    </div>

</body>
</html>
